# Graphene Intel Dashboard — nginx config
#
# Instalace:
#   cp /opt/grafene/deploy/nginx-dashboard.conf /etc/nginx/conf.d/graphene-dashboard.conf
#   nginx -t && systemctl reload nginx
#
# Předpoklady:
#   - Self-signed cert vygenerován přes: bash /opt/grafene/deploy/gen_cert.sh
#   - Nebo Let's Encrypt: certbot --nginx -d yourdomain.com
#   - Gunicorn běží na 127.0.0.1:5000

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/graphene/cert.pem;
    ssl_certificate_key /etc/ssl/graphene/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
