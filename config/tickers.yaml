# Graphene Intel — Watched Tickers
# Primary: HGRAF (HydroGraph) + BSWGF (Black Swan Graphene)
# Competitors: major graphene sector players
# Sector context: ETF proxy + commodities

primary:
  - ticker: HGRAF
    name: HydroGraph Clean Power
    canadian: HG.CN
    exchange: OTCQB
    production_method: detonation_synthesis
    feedstock: methane
    newswire: globenewswire
    website: https://hydrograph.com
    investors_url: https://hydrograph.com/investors
    keywords:
      - HydroGraph
      - HGRAF
      - "HG.CN"
      - "Fractal Graphene"
      - "Hyperion reactor"
    watch_catalysts:
      - NASDAQ listing application
      - Texas facility opening
      - Named customer announcements
      - Quarterly filings (cash runway)
      - Insider trades (Form 4 / SEDI)

  - ticker: BSWGF
    name: Black Swan Graphene
    canadian: SWAN.V
    exchange: OTCQX
    production_method: exfoliation
    feedstock: graphite
    newswire: newsfile
    website: https://blackswangraphene.com
    investors_url: https://blackswangraphene.com/investors
    keywords:
      - "Black Swan Graphene"
      - BSWGF
      - SWAN
      - GraphCore
      - GEM
    watch_catalysts:
      - Named customer revenue
      - UK facility capacity expansion
      - Thomas Swan distribution milestones
      - Quarterly filings

competitors:
  - ticker: NNXPF
    name: NanoXplore
    canadian: GRA
    exchange: OTCQX
    role: sector_leader
